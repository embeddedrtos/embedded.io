name: Validate and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Step 1: Validate JSON schemas (GitHub-hosted, fast) ─────────────────
  validate:
    name: Validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Validate all JSON
        run: npm run validate

  # ── Step 2: Deploy — only on push to main, always after validate ────────
  deploy:
    name: Deploy to Hosting
    runs-on: self-hosted
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Sync to deploy directory
        run: |
          DEPLOY_PATH="/home/$USER/public_html/embeddedio"
          mkdir -p "$DEPLOY_PATH"
          rsync -av --delete \
            --exclude='.git' \
            --exclude='script/' \
            --exclude='.github/' \
            ./ "$DEPLOY_PATH"/

  # ── Step 3: Cleanup runner workspace ─────────────────────────────────────
  cleanup:
    name: Cleanup Runner
    runs-on: self-hosted
    needs: deploy
    if: always()
    steps:
      - name: Remove workspace and old logs
        run: |
          rm -rf "$GITHUB_WORKSPACE" || true
          find $HOME/actions-runner/_diag -type f -mtime +1 -delete || true
