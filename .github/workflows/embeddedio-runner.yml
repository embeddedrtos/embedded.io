name: embeddedio

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-runner:
    runs-on: self-hosted

    steps:
      - name: 🧹 Reset runner before job
        run: |
          echo "🧹 Cleaning old runner files..."
          rm -rf $HOME/actions-runner/_work/* || true
          rm -rf $HOME/actions-runner/_diag/* || true
          echo "✅ Reset done."

      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Display current directory and files
        run: |
          echo "📁 Current directory: $PWD"
          echo "📂 List of files:"
          ls -la

      - name: Determine deploy path and create directory
        run: |
          USERNAME=$(whoami)
          DEPLOY_PATH="/home/$USERNAME/public_html/embeddedio"
          echo "📁 Deploy path: $DEPLOY_PATH"
          mkdir -p "$DEPLOY_PATH"

      - name: Run Python Script to Fetch Posts
        run: |
          USERNAME=$(whoami)
          source /home/$USERNAME/virtualenv/script/3.11/bin/activate
          python3 script/posts.py
          deactivate

      - name: Sync project files into deploy directory
        run: |
          USERNAME=$(whoami)
          DEPLOY_PATH="/home/$USERNAME/public_html/embeddedio"
          rsync -av --exclude='.git' ./ "$DEPLOY_PATH"/ --delete
